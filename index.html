<body oncontextmenu="return false" onkeydown="return false">

    <main>
        <div id="ui">
            <a href="./portfolio/" aria-label="Iniciar Portfolio">
                <button class="btn-iniciar">>INICIAR_</button>
            </a>
        </div>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from 'three';
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

            // --- 1. CONFIGURACIÓN BÁSICA ---
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7c6b8a); 

            const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Iniciamos la cámara más lejos para la animación de entrada
            camera.position.z = 12;

            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // --- 2. CARGA DE TEXTURA ---
            const loader = new THREE.TextureLoader();
            loader.crossOrigin = "anonymous"; 
            const urlTextura = 'https://raw.githubusercontent.com/arielhcontini/imagenes-para-hydra/refs/heads/main/texture_1.webp'; 
            const miTextura = loader.load(urlTextura);
            miTextura.wrapS = miTextura.wrapT = THREE.RepeatWrapping;

            // --- 3. CONFIGURACIÓN DE MATERIALES ---
            const materialFrente = new THREE.MeshStandardMaterial({ 
                map: miTextura,
                transparent: true,
                roughness: 0.6, 
                metalness: 0.888 
            });

            const materialBorde = new THREE.MeshStandardMaterial({ 
                color: 0xF4F1FF, 
                roughness: 0.1, 
                metalness: 1 
            });

            const materialesArray = [materialFrente, materialBorde];

            // --- 4. CREACIÓN DEL ISOLOGOTIPO ---
            const group = new THREE.Group();
            
            const extrudeSettings = {
                steps: 1,
                depth: 0.1,
                bevelEnabled: true,
                bevelThickness: 0.05,
                bevelSize: 0.01,
                bevelSegments: 3
            };

            const shape1 = new THREE.Shape();
            shape1.moveTo(-1, -1);
            shape1.lineTo(0.9, -1);
            shape1.lineTo(-1, 0.9);
            shape1.closePath();

            const shape2 = new THREE.Shape();
            shape2.moveTo(1, 1);
            shape2.lineTo(-0.9, 1);
            shape2.lineTo(1, -0.9);
            shape2.closePath();

            const geo1 = new THREE.ExtrudeGeometry(shape1, extrudeSettings);
            const geo2 = new THREE.ExtrudeGeometry(shape2, extrudeSettings);

            const mesh1 = new THREE.Mesh(geo1, materialesArray);
            const mesh2 = new THREE.Mesh(geo2, materialesArray);

            group.add(mesh1);
            group.add(mesh2);
            scene.add(group);

            // --- 5. ILUMINACIÓN ---
            const ambientLight = new THREE.AmbientLight(0xffffff, 2);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xC5A059, 15);
            pointLight.position.set(1, -5, 5);
            scene.add(pointLight);

            const directLight = new THREE.DirectionalLight(0xffffff, 2);
            directLight.position.set(-5, 5, 5);
            scene.add(directLight);

            // --- 6. CONTROLES ---
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 4;

            // --- 7. ANIMACIÓN 3D LOOP ---
            function animate() {
                requestAnimationFrame(animate);
                controls.update();
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            animate();

            // --- 8. SECUENCIA DE ENTRADA GSAP CINEMÁTICA ---
            const tl = gsap.timeline();

            // 1. Revelamos el canvas gradualmente (autoAlpha maneja visibility y opacity)
            tl.to("canvas", { 
                duration: 2, 
                autoAlpha: 1, 
                ease: "power2.inOut" 
            }, 0)
            // 2. Al MISMO TIEMPO, acercamos la cámara 3D desde z:12 hasta z:5
            .to(camera.position, { 
                duration: 3, 
                z: 5, 
                ease: "power3.out" 
            }, 0)
            // 3. Cuando el monolito ya está presente, emerge el botón UI desde abajo
            .fromTo("#ui", 
                { autoAlpha: 0, y: 30 },
                { duration: 1.5, autoAlpha: 1, y: 0, ease: "power3.out" },
                "-=1.5" // Arranca 1.5 segundos antes de que termine el movimiento de la cámara
            );

        </script>
    </main>
