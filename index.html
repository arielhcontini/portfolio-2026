<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ariel H. Contini</title>
    <style>
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            /* Un negro puro y profundo para máximo contraste */
            background-color: #050505; 
            overflow: hidden; font-family: monospace;
            -webkit-touch-callout: none; user-select: none;
        }
        
        canvas { 
            display: block; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; opacity: 0; transition: opacity 1.5s ease;
        }
        
        #ui {
            position: absolute; top: 85%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            pointer-events: none; z-index: 10; width: 90%; max-width: 400px;
        }

        .cta {
            color: #ffffff66; letter-spacing: 5px; font-size: 11px; text-decoration: none;
            pointer-events: auto; transition: 0.6s ease; padding: 15px 25px; display: inline-block;
            border: 1px solid transparent;
        }
        
        .cta:hover { 
            /* Acento blanco cálido en el botón */
            color: #fffae6; border: 1px solid #fffae644; 
            background-color: #fffae60a; text-shadow: 0 0 15px #fffae644; 
        }
    </style>
</head>

<body>
    <div id="ui">
        <a href="#" class="cta">>EN CONSTRUCCIÓN</a>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. ESCENA ULTRA MINIMALISTA ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x151144, 20, 60);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 40); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        setTimeout(() => renderer.domElement.style.opacity = "1", 111);

        // --- 2. GEOMETRÍA: TETRAEDRO (TRIÁNGULO 3D) ---
        // Radio 4.5 (más pequeño), Detalle 5 (para permitir deformación)
        let geometry = new THREE.TetrahedronGeometry(1.5, 3);
        geometry = geometry.toNonIndexed(); 

        // Material blanco puro, sin texturas ni colores
        const material = new THREE.MeshStandardMaterial({
            color: 0x331199,       
            flatShading: true,     
            roughness: 1.999,        
            metalness: 0.999
        });

        const tetraMesh = new THREE.Mesh(geometry, material);
        scene.add(tetraMesh);

        const posAttribute = geometry.attributes.position;
        const originalPos = new Float32Array(posAttribute.array);
        const count = posAttribute.count;

        // --- 3. LUZ AMARILLA MUY PÁLIDA (CASI BLANCA) ---
        const lightColor = 0xfffae9; // Amarillo/Blanco cálido
        
        const pointLight = new THREE.PointLight(lightColor, 900, 1000);
        scene.add(pointLight);

        // Luz ambiental gris muy oscura para que los lados no iluminados mantengan volumen
        scene.add(new THREE.AmbientLight(0x99aeff, 1.15));

        // --- 4. INTERACCIÓN ---
        const raycaster = new THREE.Raycaster();
        const mathPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), -5); 
        const pointerCoords = new THREE.Vector2(-1000, -1000);
        const interaction3D = new THREE.Vector3();
        
        const lightTarget = new THREE.Vector3(0, 0, 8); 

        function setPointer(clientX, clientY) {
            pointerCoords.x = (clientX / window.innerWidth) * 2 - 1;
            pointerCoords.y = -(clientY / window.innerHeight) * 2 + 1;
        }

        window.addEventListener('mousemove', (e) => setPointer(e.clientX, e.clientY));
        window.addEventListener('touchstart', (e) => { if(e.touches.length > 0) setPointer(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
        window.addEventListener('touchmove', (e) => {
            if (e.cancelable) e.preventDefault(); 
            if(e.touches.length > 0) setPointer(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: false });
        window.addEventListener('touchend', () => pointerCoords.set(-1000, -1000));

        // --- 5. BUCLE DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;

            raycaster.setFromCamera(pointerCoords, camera);
            if (raycaster.ray.intersectPlane(mathPlane, interaction3D)) {
                lightTarget.lerp(interaction3D, 0.1);
            } else {
                lightTarget.lerp(new THREE.Vector3(0, 0, 8), 0.9);
            }
            
            pointLight.position.copy(lightTarget);

            // DEFORMACIÓN ADAPTADA A ESCALA MÁS PEQUEÑA
            for (let i = 0; i < count; i++) {
                const ox = originalPos[i * 3];
                const oy = originalPos[i * 3 + 1];
                const oz = originalPos[i * 3 + 2];

                const distToCenter = Math.sqrt(ox*ox + oy*oy + oz*oz);
                const wave = Math.sin(time * 3 + oy * 0.999) * 0.15;

                const dx = ox - lightTarget.x;
                const dy = oy - lightTarget.y;
                const dz = oz - lightTarget.z;
                const distToTargetSq = dx*dx + dy*dy + dz*dz;

                // Ajustamos el radio de influencia (15) y la fuerza (2) por ser más pequeño
                const pullStrength = Math.exp(-distToTargetSq / 95) * 3.0; 

                const newRadius = distToCenter + wave + pullStrength;
                const scale = newRadius / distToCenter;

                posAttribute.setXYZ(i, ox * scale, oy * scale, oz * scale);
            }

            posAttribute.needsUpdate = true;
            geometry.computeVertexNormals();

            // Rotación adaptada a la forma piramidal
            tetraMesh.rotation.y = time * 2.15;
            tetraMesh.rotation.x = time * 1.111;
            tetraMesh.rotation.z = Math.sin(time * 0.05) * 1.333;

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
