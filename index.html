    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- 1. CONFIGURACIÓN BÁSICA ---
        const scene = new THREE.Scene();
        // Fondo degradado similar a tu captura
        scene.background = new THREE.Color(("rgb(11,11, 11)")); 

        const camera = new THREE.PerspectiveCamera(90, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. CREACIÓN DEL ISOLOGOTIPO ---
        const group = new THREE.Group(); // Grupo para contener ambas partes del logo
        
        const extrudeSettings = {
            steps: 1,
            depth: 0.01, // Grosor del logo
            bevelEnabled: true,
            bevelThickness: 0.05,
            bevelSize: 0.01,
            bevelSegments: 3
        };

        // Material con acabado metálico/mate sutil
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xF4F1EE, 
            roughness: 0.444, 
            metalness: 0.888 
        });

        // Parte Inferior Izquierda (Triángulo)
        const shape1 = new THREE.Shape();
        shape1.moveTo(-1, -1);
        shape1.lineTo(0.9, -1);
        shape1.lineTo(-1, 0.9);
        shape1.closePath();

        // Parte Superior Derecha (Triángulo)
        const shape2 = new THREE.Shape();
        shape2.moveTo(1, 1);
        shape2.lineTo(-0.9, 1);
        shape2.lineTo(1, -0.9);
        shape2.closePath();

        const geo1 = new THREE.ExtrudeGeometry(shape1, extrudeSettings);
        const geo2 = new THREE.ExtrudeGeometry(shape2, extrudeSettings);

        const mesh1 = new THREE.Mesh(geo1, material);
        const mesh2 = new THREE.Mesh(geo2, material);

        group.add(mesh1);
        group.add(mesh2);
        scene.add(group);

        // --- 3. ILUMINACIÓN ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 9);
        scene.add(ambientLight);

        const pointLight = new THREE.PointLight(0x119900, 10); // Luz púrpura para atmósfera
        pointLight.position.set(1, 5, 5);
        scene.add(pointLight);

        const directLight = new THREE.DirectionalLight(0xffffff, 1);
        directLight.position.set(-5, 5, 5);
        scene.add(directLight);

        // --- 4. CONTROLES ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Rotación suave
        controls.autoRotate = true;    // El logo gira solo hasta que el usuario lo toca
        controls.autoRotateSpeed = 10;

        // --- 5. ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Necesario para el damping y autoRotate
            renderer.render(scene, camera);
        }

        // Ajuste de ventana dinámico
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>




</main>

<!-- Seguir mouse con animacion de gradiente -->
<script>
  document.body.addEventListener("pointermove", (e)=>{
  const { currentTarget: el, clientX: x, clientY: y } = e;
  const { top: t, left: l, width: w, height: h } = el.getBoundingClientRect();
  el.style.setProperty('--posX',  x-l-w/2);
  el.style.setProperty('--posY',  y-t-h/2);
})
</script>
